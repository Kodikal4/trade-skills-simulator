<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Diagnostic Matrix Simulator</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --border-color: #475569;
            --radius: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .app-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .app-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .app-header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .app-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .metrics-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .metric {
            background: var(--bg-surface);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .metric span {
            color: var(--accent-blue);
        }

        .trade-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .filter-btn {
            background-color: var(--bg-surface);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .filter-btn.active {
            background-color: var(--accent-blue);
            color: var(--bg-main);
            border-color: var(--accent-blue);
            font-weight: 600;
        }

        .question-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        .trade-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-weight: 700;
            background-color: var(--bg-card);
            color: var(--accent-blue);
        }

        .component-label {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .symptom-box {
            background-color: rgba(15, 23, 42, 0.6);
            border-left: 4px solid var(--accent-blue);
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }

        .symptom-box strong {
            color: var(--text-primary);
            display: block;
            margin-bottom: 0.25rem;
        }

        .symptom-box p {
            color: var(--text-secondary);
            font-style: italic;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .choice-row {
            background-color: var(--bg-card);
            border: 1px solid transparent;
            padding: 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            text-align: left;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            width: 100%;
        }

        .choice-row:hover:not(:disabled) {
            background-color: #475569;
            border-color: var(--text-secondary);
            transform: translateX(4px);
        }

        .choice-row.correct {
            background-color: rgba(34, 197, 94, 0.2) !important;
            border-color: var(--accent-green) !important;
            color: #4ade80 !important;
            font-weight: 600;
        }

        .choice-row.incorrect {
            background-color: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--accent-red) !important;
            color: #f87171 !important;
        }

        .explanation-panel {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: rgba(15, 23, 42, 0.4);
            border-radius: var(--radius);
            border: 1px dashed var(--border-color);
            display: none;
        }

        .explanation-panel h4 {
            color: var(--accent-green);
            margin-bottom: 0.5rem;
        }

        .action-controls {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .ctrl-btn {
            background-color: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .ctrl-btn:hover:not(:disabled) {
            background-color: var(--bg-card);
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .placeholder-text {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>Industrial Trades Diagnostic Simulator</h1>
        <p>Cross-Domain Failure Mode Analysis System</p>
        
        <div class="metrics-bar">
            <div class="metric">Score: <span id="current-score">0</span></div>
            <div class="metric">Completed: <span id="questions-completed">0</span></div>
        </div>
    </header>

    <main class="app-container">
        <nav class="trade-filters">
            <button class="filter-btn active" data-trade="all">All Sectors</button>
            <button class="filter-btn" data-trade="Diesel">Heavy Diesel</button>
            <button class="filter-btn" data-trade="Lineman">Power Lineman</button>
            <button class="filter-btn" data-trade="HVAC">HVAC Specialist</button>
            <button class="filter-btn" data-trade="PowerPlant">Power Plant Ops</button>
            <button class="filter-btn" data-trade="Automation">PLC Automation</button>
        </nav>

        <section class="diagnostic-playground">
            <div id="active-question-card" class="question-card">
                <p class="placeholder-text">Initializing diagnostic array matrix...</p>
            </div>
            
            <div class="action-controls">
                <button id="next-btn" class="ctrl-btn" style="display: none;">Next / Skip</button>
            </div>
        </section>
    </main>

    <script>
        let activeChallenges = [];
        let currentChallengeIndex = 0;
        let score = 0;
        let completedCount = 0;

        // Attach layout filtering listeners directly to your sector navigation buttons
        document.querySelectorAll('.filter-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                const selectedTrade = e.target.getAttribute('data-trade');
                fetchChallengesFromAPI(selectedTrade);
            });
        });

        // Pull active entries cleanly from your serverless API route using standard web fetch
        async function fetchChallengesFromAPI(tradeType) {
            const cardContainer = document.getElementById('active-question-card');
            cardContainer.innerHTML = '<p class="placeholder-text">Pulling live tracks securely from cloud core...</p>';
            document.getElementById('next-btn').style.display = 'none';

            try {
                const response = await fetch(`/api/getChallenges?trade_type=${tradeType}`);
                if (!response.ok) throw new Error(`Database link status error: ${response.status}`);

                activeChallenges = await response.json();
                currentChallengeIndex = 0;
                
                loadChallenge();
            } catch (err) {
                console.error("Database sync failed:", err);
                cardContainer.innerHTML = `
                    <div class="card-meta"><span class="trade-badge" style="background-color: var(--accent-red); color: white;">LINK EMBED FAULT</span></div>
                    <p class="question-text">Unable to securely communicate with the database API terminal layer.</p>
                `;
            }
        }

        // Render current data row into the functional HTML card structure
        function loadChallenge() {
            const cardContainer = document.getElementById('active-question-card');
            document.getElementById('next-btn').style.display = 'none';

            if (activeChallenges.length === 0) {
                cardContainer.innerHTML = '<p class="placeholder-text">No challenge data records found in this category segment.</p>';
                return;
            }

            if (currentChallengeIndex >= activeChallenges.length) {
                cardContainer.innerHTML = `
                    <div class="card-meta"><span class="trade-badge">Evaluation Terminated</span></div>
                    <p class="question-text" style="text-align: center;">All isolated vulnerabilities for this node have been completely analyzed.</p>
                    <p class="placeholder-text" style="margin-top: 1rem;">Final Category Score: ${score} / ${activeChallenges.length}</p>
                `;
                return;
            }

            const currentData = activeChallenges[currentChallengeIndex];

            // Build structural interactive HTML cards cleanly without breaking reference IDs
            cardContainer.innerHTML = `
                <div class="card-meta">
                    <span class="trade-badge">${currentData.trade_type}</span>
                    <span class="component-label">ID: #${currentData.id || (currentChallengeIndex + 1)}</span>
                </div>
                <div class="component-label" style="margin-bottom: 0.5rem; text-transform: uppercase;">System: ${currentData.component}</div>
                <div class="symptom-box">
                    <strong>Symptom Profile:</strong>
                    <p>${currentData.symptom}</p>
                </div>
                <p class="question-text">${currentData.question}</p>
                <div class="choices-container" id="options-box"></div>
                <div class="explanation-panel" id="feedback-box">
                    <h4 id="result-header"></h4>
                    <p id="explanation-text"></p>
                </div>
            `;

            const optionsBox = document.getElementById('options-box');
            
            // Loop over choices array and build custom styled buttons
            currentData.choices.forEach(choice => {
                const button = document.createElement('button');
                button.className = 'choice-row';
                button.textContent = choice;
                button.onclick = () => evaluateAnswer(choice, currentData, button);
                optionsBox.appendChild(button);
            });
        }

        // Handle user clicks, score increments, and visual highlights
        function evaluateAnswer(selectedChoice, challengeData, clickedButton) {
            const allButtons = document.querySelectorAll('.choice-row');
            allButtons.forEach(btn => btn.disabled = true); // Freeze selection loop immediately

            const feedbackBox = document.getElementById('feedback-box');
            const resultHeader = document.getElementById('result-header');
            const explanationText = document.getElementById('explanation-text');

            completedCount++;
            document.getElementById('questions-completed').textContent = completedCount;

            if (selectedChoice === challengeData.failure_mode) {
                clickedButton.classList.add('correct');
                resultHeader.textContent = "✓ TELEMETRY BOUNDARY VALIDATED - ROOT CAUSE ISOLATED";
                resultHeader.style.color = "var(--accent-green)";
                score++;
                document.getElementById('current-score').textContent = score;
            } else {
                clickedButton.classList.add('incorrect');
                resultHeader.textContent = "✗ CRITICAL TELEMETRY ERROR - COLLATERAL FAILURE RISK";
                resultHeader.style.color = "var(--accent-red)";
                
                // Pinpoint and visually highlight the correct index choice for learning correction
                allButtons.forEach(btn => {
                    if (btn.textContent === challengeData.failure_mode) {
                        btn.classList.add('correct');
                    }
                });
            }

            explanationText.textContent = challengeData.explanation;
            feedbackBox.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        // Wire up the interactive Next step execution click handler
        document.getElementById('next-btn').addEventListener('click', () => {
            currentChallengeIndex++;
            loadChallenge();
        });

        // Self-trigger base matrix loading sequence on initial page mount
        fetchChallengesFromAPI('all');
    </script>
</body>
</html>
