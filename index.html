<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skilled-Trade Startup Database Console</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #22c55e;
            --border-color: #334155;
            --radius: 6px;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 { font-size: 1.8rem; color: var(--text-primary); }
        p { color: var(--text-secondary); }

        .data-entry-form {
            background: var(--bg-surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        input, textarea, select {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem;
            border-radius: var(--radius);
            font-family: inherit;
        }

        .full-width { grid-column: span 2; }

        button {
            background: var(--accent-blue);
            color: var(--bg-main);
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            align-self: flex-end;
        }

        button:hover { opacity: 0.9; }

        .database-grid-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background: rgba(15, 23, 42, 0.6);
            color: var(--accent-blue);
            padding: 1rem;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            vertical-align: top;
        }

        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .badge {
            background: #334155;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Skilled-Trade Master Database Console</h1>
            <p>Live Connected Infrastructure Analytics Control Panel</p>
        </header>

        <form class="data-entry-form" id="record-form">
            <div class="form-group">
                <label>Trade Sector</label>
                <select id="trade_type" required>
                    <option value="Diesel">Heavy Diesel</option>
                    <option value="Lineman">Power Lineman</option>
                    <option value="HVAC">HVAC Specialist</option>
                    <option value="PowerPlant">Power Plant Ops</option>
                    <option value="Automation">PLC Automation</option>
                </select>
            </div>
            <div class="form-group">
                <label>Component Asset</label>
                <input type="text" id="component" placeholder="e.g. Common Rail Injector" required>
            </div>
            <div class="form-group full-width">
                <label>Telemetry Symptom Profile</label>
                <input type="text" id="symptom" placeholder="Describe the physical failure presentation..." required>
            </div>
            <div class="form-group full-width">
                <label>Core Diagnostic Question</label>
                <input type="text" id="question" placeholder="Engineering isolation query..." required>
            </div>
            <div class="form-group full-width">
                <label>Multiple Choice Options (Comma Separated)</label>
                <input type="text" id="choices" placeholder="Option A, Option B, Option C, Option D" required>
            </div>
            <div class="form-group">
                <label>Verified Failure Mode (Root Cause)</label>
                <input type="text" id="failure_mode" placeholder="True root cause mechanical failure" required>
            </div>
            <div class="form-group">
                <label>Engineering Explanation</label>
                <textarea id="explanation" rows="2" placeholder="Provide root cause failure physics details..." required></textarea>
            </div>
            <button type="submit">Insert Record</button>
        </form>

        <div class="database-grid-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 5%">ID</th>
                        <th style="width: 10%">Sector</th>
                        <th style="width: 15%">Asset Component</th>
                        <th style="width: 20%">Symptom Matrix</th>
                        <th style="width: 20%">Verified Failure Mode</th>
                        <th style="width: 30%">Multiple Choice Options</th>
                    </tr>
                </thead>
                <tbody id="database-rows">
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-secondary);">Connecting to PostgreSQL server core instance...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const tbody = document.getElementById('database-rows');
        const form = document.getElementById('record-form');
    
        const BACKEND_URL = 'https://trade-skills-admin-ffghcugjgaa2azb0.centralus-01.azurewebsites.net';

        async function refreshDatabaseView() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/trades`); 
                if (!response.ok) throw new Error('API Sync Fault');
                
                const data = await response.json();
                tbody.innerHTML = ''; 

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">No records found. Add an entry above!</td></tr>`;
                    return;
                }

                data.forEach(row => {
                    const tr = document.createElement('tr');
                    
                    // Create base columns
                    tr.innerHTML = `
                        <td><span class="badge">#${row.id || 'N/A'}</span></td>
                        <td><strong>${row.trade_type || row.sector || 'N/A'}</strong></td>
                        <td style="color: var(--accent-blue); font-weight:600;">${row.component}</td>
                        <td>${row.symptom}</td>
                        <td><em>${row.failure_mode || 'N/A'}</em></td>
                    `;

                    // Create choice display element dynamically 
                    const choicesCell = document.createElement('td');
                    if (row.choices && Array.isArray(row.choices)) {
                        choicesCell.innerHTML = row.choices.map(opt => `<div style="margin-bottom:4px; font-size:0.85rem; color:var(--text-secondary);">• ${opt}</div>`).join('');
                    } else {
                        choicesCell.textContent = 'N/A';
                        choicesCell.style.color = 'var(--text-secondary)';
                    }
                    
                    tr.appendChild(choicesCell);
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #ef4444;">Failed to fetch data stream from cloud database layer.</td></tr>`;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Convert comma separated input text string into a clean clean text string array
            const choicesArray = document.getElementById('choices').value.split(',').map(item => item.trim());

            const payload = {
                sector: document.getElementById('trade_type').value,
                component: document.getElementById('component').value,
                symptom: document.getElementById('symptom').value,
                question: document.getElementById('question').value,
                failure_mode: document.getElementById('failure_mode').value,
                explanation: document.getElementById('explanation').value,
                choices: choicesArray
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/trades`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    form.reset();
                    refreshDatabaseView(); 
                } else {
                    alert('Database insert operation rejected.');
                }
            } catch (err) {
                console.error(err);
                alert('Failed to connect to backend api layer.');
            }
        });

        refreshDatabaseView();
   </script>
</body>
</html>
