<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skilled-Trade Startup Database Console</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #22c55e;
            --border-color: #334155;
            --radius: 6px;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 { font-size: 1.8rem; color: var(--text-primary); }
        p { color: var(--text-secondary); }

        .data-entry-form {
            background: var(--bg-surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        input, textarea, select {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem;
            border-radius: var(--radius);
            font-family: inherit;
        }

        .full-width { grid-column: span 2; }

        button {
            background: var(--accent-blue);
            color: var(--bg-main);
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            align-self: flex-end;
        }

        button:hover { opacity: 0.9; }

        .database-grid-container {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background: rgba(15, 23, 42, 0.6);
            color: var(--accent-blue);
            padding: 1rem;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            vertical-align: top;
        }

        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .badge {
            background: #334155;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Skilled-Trade Master Database Console</h1>
            <p>Live Connected Infrastructure Analytics Control Panel</p>
            <div id="scoreboard" style="
                position: sticky;
                top: 10px;
                z-index: 100;
                background: var(--bg-surface);
                border: 2px solid var(--accent-blue);
                padding: 1rem;
                border-radius: var(--radius);
                margin-bottom: 1.5rem;
                font-size: 1.1rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            ">
                🏆 Score: <strong>0</strong> / 0 (0%)
            </div>
        </header>

        <form class="data-entry-form" id="record-form">
            <div class="form-group">
                <label>Trade Sector</label>
                <select id="trade_type" required>
                    <option value="Diesel">Heavy Diesel</option>
                    <option value="Lineman">Power Lineman</option>
                    <option value="HVAC">HVAC Specialist</option>
                    <option value="PowerPlant">Power Plant Ops</option>
                    <option value="Automation">PLC Automation</option>
                </select>
            </div>
            <div class="form-group">
                <label>Component Asset</label>
                <input type="text" id="component" placeholder="e.g. Common Rail Injector" required>
            </div>
            <div class="form-group full-width">
                <label>Telemetry Symptom Profile</label>
                <input type="text" id="symptom" placeholder="Describe the physical failure presentation..." required>
            </div>
            <div class="form-group full-width">
                <label>Core Diagnostic Question</label>
                <input type="text" id="question" placeholder="Engineering isolation query..." required>
            </div>
            <div class="form-group full-width">
                <label>Multiple Choice Options (Comma Separated)</label>
                <input type="text" id="choices" placeholder="Option A, Option B, Option C, Option D" required>
            </div>
            <div class="form-group">
                <label>Verified Failure Mode (Root Cause)</label>
                <input type="text" id="failure_mode" placeholder="True root cause mechanical failure" required>
            </div>
            <div class="form-group">
                <label>Engineering Explanation</label>
                <textarea id="explanation" rows="2" placeholder="Provide root cause failure physics details..." required></textarea>
            </div>
            <button type="submit">Insert Record</button>
        </form>

        <div class="database-grid-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 5%">ID</th>
                        <th style="width: 10%">Sector</th>
                        <th style="width: 15%">Asset Component</th>
                        <th style="width: 25%">Symptom Matrix</th>
                        <th style="width: 20%">Verified Failure Mode / Physics</th>
                        <th style="width: 25%">Multiple Choice Options</th>
                    </tr>
                </thead>
                <tbody id="database-rows">
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-secondary);">Connecting to PostgreSQL server core instance...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const tbody = document.getElementById('database-rows');
        const form = document.getElementById('record-form');
    
        const BACKEND_URL = 'https://trade-skills-admin-ffghcugjgaa2azb0.centralus-01.azurewebsites.net';

        let totalCorrect = 0;
        let totalAttempted = 0;

        function updateScoreboard() {
            const scoreboard = document.getElementById('scoreboard');
            if (scoreboard) {
                scoreboard.innerHTML = `🏆 Score: <strong>${totalCorrect}</strong> / ${totalAttempted} (${totalAttempted > 0 ? Math.round((totalCorrect/totalAttempted)*100) : 0}%)`;
            }
        }

        // WRAPPED RETRIEVAL LOOP: Pulls directly from your Azure API endpoint safely
        async function refreshDatabaseView() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/trades`);
                if (!response.ok) throw new Error('API communication link dropped.');
                
                const data = await response.json();
                tbody.innerHTML = ''; // Clear processing loader indicator text

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">No records found in the database matrix.</td></tr>`;
                    return;
                }

                data.forEach(row => {
                    const tr = document.createElement('tr');
            
                    // Render base infrastructure logs
                    tr.innerHTML = `
                        <td><span class="badge">#${row.id || 'N/A'}</span></td>
                        <td><strong>${row.sector || row.trade_type || 'N/A'}</strong></td>
                        <td style="color: var(--accent-blue); font-weight:600;">${row.component || 'N/A'}</td>
                        <td>
                            <div style="font-weight:600; margin-bottom: 6px;">${row.symptom || 'N/A'}</div>
                            <div style="color: var(--text-secondary); font-size: 0.85rem; font-style: italic;">Q: ${row.question || 'No question assigned.'}</div>
                        </td>
                        <td>
                            <div class="explanation-block" style="display:none; font-size: 0.85rem; background: rgba(15, 23, 42, 0.4); padding: 0.5rem; border-radius: 4px; border-left: 3px solid var(--accent-blue);">
                                <div style="font-weight:700; color:var(--accent-green); margin-bottom:4px;">✔ Root Cause:</div>
                                <div style="margin-bottom:6px; font-weight:600;">${row.failure_mode}</div>
                                <div style="color:var(--text-secondary); font-style:italic;">${row.explanation || 'No historical physics log available.'}</div>
                            </div>
                            <span class="lock-placeholder" style="color: var(--text-secondary); font-size:0.85rem;">🔒 Select an answer to evaluate...</span>
                        </td>
                    `;

                    const choicesCell = document.createElement('td');
                    
                    if (row.choices && Array.isArray(row.choices) && row.choices.length > 0 && row.choices[0] !== 'B') {
                        // Dynamically build individual selection action controllers
                        row.choices.forEach(option => {
                            const btn = document.createElement('button');
                            btn.textContent = option;
                            btn.style.cssText = `
                                display: block;
                                width: 100%;
                                text-align: left;
                                background: #334155;
                                color: var(--text-primary);
                                padding: 0.5rem;
                                margin-bottom: 6px;
                                border: 1px solid var(--border-color);
                                border-radius: 4px;
                                font-size: 0.85rem;
                                cursor: pointer;
                                transition: all 0.2s ease;
                            `;

                            btn.addEventListener('click', () => {
                                const parent = btn.parentElement;
                                if (parent.classList.contains('answered')) return; // Prevent double evaluation
                                parent.classList.add('answered');

                                totalAttempted++;
                                
                                // Direct character validation against database string record
                                const isCorrect = (option.toLowerCase().trim() === row.failure_mode.toLowerCase().trim());
                                
                                if (isCorrect) {
                                    btn.style.background = '#15803d'; // Emerald green
                                    btn.style.borderColor = '#22c55e';
                                    totalCorrect++;
                                } else {
                                    btn.style.background = '#b91c1c'; // Crimson red
                                    btn.style.borderColor = '#ef4444';
                                    
                                    // Highlight correct target option line
                                    Array.from(parent.children).forEach(sibling => {
                                        if (sibling.textContent.toLowerCase().trim() === row.failure_mode.toLowerCase().trim()) {
                                            sibling.style.background = '#15803d';
                                            sibling.style.borderColor = '#22c55e';
                                        }
                                    });
                                }

                                // Open structural explanation drawer details inside column
                                const expBlock = tr.querySelector('.explanation-block');
                                const lockText = tr.querySelector('.lock-placeholder');
                                if (expBlock) expBlock.style.display = 'block';
                                if (lockText) lockText.style.display = 'none';

                                updateScoreboard();
                            });

                            choicesCell.appendChild(btn);
                        });
                    } else {
                        choicesCell.textContent = 'Admin row (No test parameters mapped).';
                        choicesCell.style.color = 'var(--text-secondary)';
                        choicesCell.style.fontSize = '0.85rem';
                    }
                    
                    tr.appendChild(choicesCell);
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #ef4444;">Failed to sync with central database network.</td></tr>`;
            }
        }

        // Submit form entry payload handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const choicesArray = document.getElementById('choices').value.split(',').map(item => item.trim());

            const payload = {
                sector: document.getElementById('trade_type').value,
                component: document.getElementById('component').value,
                symptom: document.getElementById('symptom').value,
                question: document.getElementById('question').value,
                failure_mode: document.getElementById('failure_mode').value,
                explanation: document.getElementById('explanation').value,
                choices: choicesArray
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/trades`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    form.reset();
                    refreshDatabaseView(); 
                } else {
                    alert('Database insert operation rejected.');
                }
            } catch (err) {
                console.error(err);
                alert('Failed to connect to backend api layer.');
            }
        });

        // Initialize table dataset on browser boot
        refreshDatabaseView();
   </script>
</body>
</html>
